<script src="https://unpkg.com/feather-icons"></script>

</head>

<body>
<header>
    <nav class="menu-navegacao">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="dashboard.html">Painel de Controle</a></li>
            <li><a href="produtos.html">Catálogo de Produtos</a></li>
            <li><a href="carrinho.html">Meu Carrinho</a></li>
            <li><a href="sobre.html">Sobre o Projeto</a></li>
        </ul>
    </nav>

<header class="navbar">

<div class="logo">
<div class="logo-box">GL</div>
<div>
<h2>Geek Legends</h2>
<p>Produtos Dignos de Lenda</p>
</div>
</div>

<nav>
<a href="#">Início</a>
<a href="#">Produtos</a>
<a href="#">Sobre</a>
</nav>

<div class="nav-right">
<a href="#">Login</a>
<i data-feather="shopping-cart"></i>
</div>

</header>


<section class="login-area">

<div class="login-box">

<div class="login-logo">GL</div>

<h1>Bem-vindo de Volta!</h1>
<p class="subtitle">Entre na sua conta para continuar</p>


<form id="loginForm">

<div class="input-group">

<label>Email</label>

<div class="input-icon">
<i data-feather="mail"></i>
<input type="email" placeholder="seu@email.com" required>
</div>

</div>


<div class="input-group">

<label>Senha</label>

<div class="input-icon">
<i data-feather="lock"></i>
<input type="password" placeholder="********" required>
</div>

</div>

<a class="forgot">Esqueceu a senha?</a>

<button class="btn-login">
<i data-feather="zap"></i>
Entrar
</button>

</form>

<p class="register">
Não tem uma conta? <span>Cadastre-se</span>
</p>


<div class="divider">
<span>ou continue com</span>
</div>


<div class="social-login">

<button class="google">
<i data-feather="chrome"></i>
Google
</button>

<button class="github">
<i data-feather="github"></i>
GitHub
</button>

</div>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
